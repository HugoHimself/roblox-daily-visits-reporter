databases:
  - name: roblox-visits-db
    plan: free

services:
  - type: cron
    name: roblox-daily-visits
    runtime: python
    schedule: "0 8 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: roblox-visits-db
          property: connectionString
