name: Pages Data Refresh

on:
  schedule:
    # Every 10 minutes, offset off the ccu (:10) and milestone (:20) jobs
    - cron: "5,15,25,35,45,55 * * * *"
  push:
    branches: [main]
    paths:
      - "build_pages.py"
      - "dashboard.py"
      - "main.py"
      - "milestones.py"
      - "docs/index.html"
      - "data/extra_games.json"
      - "data/manual.json"
  workflow_dispatch: {}

# Allow the workflow to commit the refreshed snapshot back to the repo
permissions:
  contents: write

concurrency:
  group: roblox-data-write
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build docs/portfolio.json
        run: python build_pages.py

      - name: Commit refreshed snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/portfolio.json
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "data: pages snapshot $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase --autostash origin ${{ github.ref_name }}
            git push
          fi
